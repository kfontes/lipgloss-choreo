<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lip Gloss Dance Tutorial</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#f5f0ed;
    --surface:#fff;
    --accent:#d6456e;
    --accent-soft:rgba(214,69,110,.08);
    --accent-mid:rgba(214,69,110,.15);
    --text:#1a1a1a;
    --text-secondary:#6b6b6b;
    --text-tertiary:#a0a0a0;
    --border:rgba(0,0,0,.06);
    --shadow-sm:0 1px 3px rgba(0,0,0,.04);
    --shadow-md:0 4px 20px rgba(0,0,0,.06);
    --shadow-lg:0 8px 40px rgba(0,0,0,.08);
    --radius:16px;
    --radius-sm:10px;
    --radius-full:100px;
  }
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

  /* Header */
  .app-header{
    padding:24px 20px 20px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
  }
  .app-header h1{
    font-size:1.15rem;
    font-weight:800;
    letter-spacing:-.02em;
    color:var(--text);
  }
  .app-header h1 span{color:var(--accent)}
  .app-header .subtitle{
    color:var(--text-tertiary);
    font-size:.78rem;
    margin-top:3px;
    font-weight:500;
  }

  /* Set Tabs */
  .set-tabs{
    display:flex;
    gap:6px;
    padding:12px 20px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
  }
  .set-tab{
    padding:7px 16px;
    border-radius:var(--radius-full);
    border:none;
    background:var(--accent-soft);
    color:var(--text-secondary);
    font-family:inherit;
    font-size:.8rem;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
    transition:all .2s ease;
  }
  .set-tab.active{
    background:var(--accent);
    color:white;
  }
  .set-tab:hover:not(.active):not(:disabled){
    background:var(--accent-mid);
    color:var(--text);
  }
  .set-tab:disabled{opacity:.25;cursor:not-allowed}

  /* Count Strip */
  .count-strip{
    display:flex;
    gap:8px;
    padding:14px 20px;
    overflow-x:auto;
    background:var(--surface);
    border-bottom:1px solid var(--border);
  }
  .count-btn{
    width:40px;height:40px;
    border-radius:12px;
    border:none;
    background:var(--bg);
    color:var(--text-tertiary);
    font-family:inherit;
    font-size:.82rem;
    font-weight:700;
    cursor:pointer;
    flex-shrink:0;
    transition:all .15s ease;
  }
  .count-btn.active{
    background:var(--accent);
    color:white;
    box-shadow:0 2px 12px rgba(214,69,110,.3);
    transform:translateY(-1px);
  }
  .count-btn:hover:not(.active){
    background:var(--accent-mid);
    color:var(--accent);
  }

  /* Main View */
  .main-view{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:16px 20px 20px;
    max-width:440px;
    margin:0 auto;
  }

  /* Count + Lyric top bar */
  .count-label{
    font-size:.7rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.12em;
    color:var(--accent);
    background:var(--accent-soft);
    padding:4px 14px;
    border-radius:var(--radius-full);
    margin-bottom:10px;
  }
  .lyric-line{
    font-size:1.2rem;
    color:var(--text);
    font-weight:700;
    margin-bottom:20px;
    text-align:center;
    min-height:1.6em;
    letter-spacing:-.01em;
  }

  /* Image Card */
  .img-card{
    width:100%;
    background:var(--surface);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:var(--shadow-md);
  }
  .dance-img{
    width:100%;
    display:block;
    max-height:45vh;
    object-fit:contain;
    background:#f5f0ed;
  }

  /* Move description */
  .move-desc{
    margin-top:16px;
    padding:14px 16px;
    background:var(--surface);
    border-radius:var(--radius-sm);
    color:var(--text-secondary);
    font-size:.85rem;
    line-height:1.5;
    width:100%;
    box-shadow:var(--shadow-sm);
  }
  .move-desc strong{
    color:var(--text);
    font-weight:600;
  }

  /* Nav */
  .nav-row{
    display:flex;
    gap:10px;
    margin-top:20px;
    width:100%;
  }
  .nav-btn{
    flex:1;
    padding:12px 0;
    border-radius:var(--radius-sm);
    border:none;
    background:var(--surface);
    color:var(--text);
    font-family:inherit;
    font-size:.85rem;
    font-weight:600;
    cursor:pointer;
    transition:all .15s ease;
    box-shadow:var(--shadow-sm);
  }
  .nav-btn:hover{
    background:var(--accent);
    color:white;
    box-shadow:0 2px 12px rgba(214,69,110,.25);
  }
  .nav-btn:disabled{opacity:.25;cursor:not-allowed}
  .nav-btn:disabled:hover{background:var(--surface);color:var(--text);box-shadow:var(--shadow-sm)}

  /* Footer */
  .lyrics-footer{
    padding:16px 20px;
    text-align:center;
    color:var(--text-tertiary);
    font-size:.75rem;
    margin-top:8px;
    font-weight:500;
  }
</style>
</head>

let currentSet = 0;
let currentCount = 0;

function render() {
  const set = SETS[currentSet];
  const step = set.counts[currentCount];
  const app = document.getElementById("app");

  let countBtns = set.counts.map((c, i) =>
    `<button class="count-btn ${i === currentCount ? 'active' : ''}" onclick="goCount(${i})">${c.count}</button>`
  ).join("");

  let setTabs = SETS.map((s, i) => {
    const disabled = s.counts.length === 0 ? "disabled" : "";
    return `<button class="set-tab ${i === currentSet ? 'active' : ''}" ${disabled} onclick="goSet(${i})">${s.name}</button>`;
  }).join("");

  app.innerHTML = `
    <div class="app-header">
      <h1>Lip Gloss <span>Tutorial</span></h1>
      <div class="subtitle">Lil Mama · Choreography by counts</div>
    </div>
    <div class="set-tabs">${setTabs}</div>
    <div class="count-strip">${countBtns}</div>
    <div class="main-view">
      <div class="count-label">Count ${step.count}</div>
      <div class="lyric-line">"${step.lyric}"</div>
      <div class="img-card"><img class="dance-img" src="${step.img}" alt="Count ${step.count}"></div>
      ${step.note ? `<div class="move-desc"><strong>Move:</strong> ${step.note}</div>` : ""}
      <div class="nav-row">
        <button class="nav-btn" ${currentCount === 0 ? 'disabled' : ''} onclick="prev()">&#8592; Prev</button>
        <button class="nav-btn" ${currentCount === set.counts.length - 1 ? 'disabled' : ''} onclick="next()">Next &#8594;</button>
      </div>
    </div>
    <div class="lyrics-footer">${set.fullLyric || ""}</div>
  `;
}

function goCount(i) { currentCount = i; render(); }
function goSet(i) { if (SETS[i].counts.length > 0) { currentSet = i; currentCount = 0; render(); } }
function prev() { if (currentCount > 0) { currentCount--; render(); } }
function next() { const set = SETS[currentSet]; if (currentCount < set.counts.length - 1) { currentCount++; render(); } }

document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight" || e.key === "ArrowDown") next();
  if (e.key === "ArrowLeft" || e.key === "ArrowUp") prev();
});

render();
